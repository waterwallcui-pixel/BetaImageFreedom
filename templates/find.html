<!DOCTYPE html>
<html>
<head>
    <title>查找信息</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="p-5">
    <h2>已上传图片信息</h2>
    <a href="{{ url_for('index') }}" class="btn btn-secondary mb-3">返回首页</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>图片</th>
                <th>加密后的 Seed</th>
                <th>接收者公钥</th>
                <th>下载</th>
            </tr>
        </thead>
        <tbody>
            {% for item in data %}
            <tr>
                <td><img src="{{ url_for('static', filename='uploads/' + item.filename) }}" width="100"></td>
                <td>{{ item.seed }}</td>
                <td>{{ item.publickey }}</td>
                <td><a href="{{ url_for('download_file', filename=item.filename) }}" class="btn btn-sm btn-primary">下载</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
